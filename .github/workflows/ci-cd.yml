name: CI/CD Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  NODE_VERSION: "22"
  ECR_REPO: "empire/atlas-webui"
  K8S_DEPLOYMENT: "atlas-webui"

jobs:
  # ── Gate 1: Validate & Build ──────────────────────────────────────
  validate:
    name: "Gate 1: Validate & Build"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate
        continue-on-error: true

      - name: TypeScript type-check
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Build
        run: npm run build

  # ── Gate 2: Deploy ────────────────────────────────────────────────
  deploy:
    name: "Gate 2: Deploy"
    needs: validate
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Vercel
        run: |
          npm i -g vercel
          vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
          vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
          vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        id: meta
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $REGISTRY/$ECR_REPO:$IMAGE_TAG -t $REGISTRY/$ECR_REPO:latest .
          docker push $REGISTRY/$ECR_REPO:$IMAGE_TAG
          docker push $REGISTRY/$ECR_REPO:latest
          echo "tags=$REGISTRY/$ECR_REPO:$IMAGE_TAG" >> "$GITHUB_OUTPUT"

  # ── Gate 3: Kubernetes Deploy ─────────────────────────────────────
  kubernetes-deploy:
    name: "Gate 3: Kubernetes (EKS)"
    needs: deploy
    if: ${{ vars.EKS_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ secrets.EKS_CLUSTER_NAME }} --region ${{ secrets.AWS_REGION }}

      - name: Apply K8s manifests
        run: kubectl apply -f k8s/ -n atlas-production

      - name: Rolling update
        env:
          REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
        run: |
          kubectl set image deployment/${{ env.K8S_DEPLOYMENT }} \
            ${{ env.K8S_DEPLOYMENT }}=$REGISTRY/${{ env.ECR_REPO }}:${{ github.sha }} \
            -n atlas-production

      - name: Wait for rollout
        run: kubectl rollout status deployment/${{ env.K8S_DEPLOYMENT }} -n atlas-production --timeout=300s

      - name: Verify deployment
        run: |
          kubectl get pods -n atlas-production -l app=${{ env.K8S_DEPLOYMENT }} -o wide
          echo "Kubernetes deployment updated successfully"

  # ── Gate 4: Postman Collection Run ────────────────────────────────
  postman-collection-run:
    name: "Gate 4: Postman Collection Run"
    needs: deploy
    if: always() && needs.deploy.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Install Postman CLI
        run: curl -o- "https://dl-cli.pstmn.io/install/linux64.sh" | sh

      - name: Login to Postman
        run: postman login --with-api-key ${{ secrets.POSTMAN_API_KEY }}

      - name: Resolve Collection UID
        id: resolve
        run: |
          COLL_UID=$(curl -sf "https://api.getpostman.com/collections?workspace=${{ secrets.POSTMAN_WORKSPACE_ID }}" \
            -H "x-api-key: ${{ secrets.POSTMAN_API_KEY }}" \
            | jq -r '.collections[0].uid // empty')
          echo "collection_uid=$COLL_UID" >> $GITHUB_OUTPUT
          echo "Resolved collection: $COLL_UID"

      - name: Run Collection
        if: steps.resolve.outputs.collection_uid != ''
        run: |
          postman collection run ${{ steps.resolve.outputs.collection_uid }} \
            --postman-api-key ${{ secrets.POSTMAN_API_KEY }}
        continue-on-error: true

      - name: Summary
        if: always()
        run: |
          echo "### Postman Collection Run - Atlas WebUI" >> $GITHUB_STEP_SUMMARY
          echo "- **Collection**: ${{ steps.resolve.outputs.collection_uid }}" >> $GITHUB_STEP_SUMMARY

  # ── Gate 5: API Catalog Onboard ───────────────────────────────────
  api-catalog-onboard:
    name: "Gate 5: API Catalog Onboard"
    needs: deploy
    if: always() && needs.deploy.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Link workspace to GitHub repo
        env:
          ACCESS_TOKEN: ${{ secrets.POSTMAN_ACCESS_TOKEN }}
          TEAM_ID: ${{ secrets.POSTMAN_TEAM_ID }}
          WORKSPACE_ID: "5c68c7b8-42ac-4942-86ae-a1fa716ad2e6"
          REPO_URL: https://github.com/${{ github.repository }}
        run: |
          BIFROST="https://bifrost-premium-https-v4.gw.postman.com"
          RESP=$(curl -sf -X POST "$BIFROST/ws/proxy" \
            -H "Content-Type: application/json" \
            -H "x-access-token: $ACCESS_TOKEN" \
            -H "x-entity-team-id: $TEAM_ID" \
            -d "{\"service\":\"workspaces\",\"method\":\"POST\",\"path\":\"/workspaces/$WORKSPACE_ID/filesystem\",\"body\":{\"path\":\"/\",\"repo\":\"$REPO_URL\",\"versionControl\":true}}" 2>&1) || true
          echo "Workspace link: $RESP"

      - name: Link environment to system environment
        env:
          ACCESS_TOKEN: ${{ secrets.POSTMAN_ACCESS_TOKEN }}
          TEAM_ID: ${{ secrets.POSTMAN_TEAM_ID }}
        run: |
          curl -sf -X PUT "https://bifrost-premium-https-v4.gw.postman.com/environment/96565d2b-e0e7-4e64-97bb-6820809c5b27" \
            -H "Content-Type: application/json" \
            -H "x-access-token: $ACCESS_TOKEN" \
            -H "x-entity-team-id: $TEAM_ID" \
            -d '{"systemEnvironmentId":"936898ce-cf73-4feb-827e-8a0e9d5e695e"}' || true
          echo "Environment linked to Production system environment"

      - name: Summary
        if: always()
        run: |
          echo "### API Catalog Onboard" >> $GITHUB_STEP_SUMMARY
          echo "- Workspace linked to GitHub repo" >> $GITHUB_STEP_SUMMARY
          echo "- Environment linked to Production system environment" >> $GITHUB_STEP_SUMMARY
